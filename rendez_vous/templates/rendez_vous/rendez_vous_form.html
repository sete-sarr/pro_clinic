<div class="container py-5">

    <div class="form-card col-lg-6 mx-auto">

        <!-- HEADER -->
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-calendar-plus fs-3 me-2 text-primary"></i>
            <div class="form-title">Nouveau rendez-vous</div>
        </div>

        <form method="post">
            {% csrf_token %}
             <!-- patient    -->
            <div class="mb-4">
            <label class="form-label fw-bold">
                <i class="bi bi-person"></i> Patient
            </label>
                    {{ form.patient }}
            </div>
             <!-- creation d'un nouveau patient -->
            <div class="d-flex justify-content-between align-items-center mt-2">
                <small class="text-muted">Tapez pour rechercher un patient</small>
                <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addPatientModal">
                    <i class="bi bi-plus-circle"></i> Nouveau patient
                </button>
            </div>

            <!-- DATE -->
            <div class="mb-4">
                <label class="form-label">Date</label>
                <div class="input-wrapper">
                    <i class="bi bi-calendar-date input-group-text"></i>
                    {{ form.date }}
                </div>
            </div>

            <!-- HEURE -->
            <div class="mb-4">
                <label class="form-label">Heure</label>
                <div class="input-wrapper">
                    <i class="bi bi-clock input-group-text"></i>
                    {{ form.heure }}
                </div>
            </div>

            <!-- STATUT -->
            <div class="mb-4">
                <label class="form-label">Statut</label>
                <div class="input-wrapper">
                    <i class="bi bi-check-circle input-group-text"></i>
                    {{ form.statut }}
                </div>
            </div>

            

            <!-- ACTION -->
            <div class="d-flex justify-content-between mt-4">

                <a href="{% url 'consultations:list' %}" class="btn btn-outline-light">
                    <i class="bi bi-arrow-left"></i> Annuler
                </a>

                <button type="submit" class="btn btn-submit text-white">
                    <i class="bi bi-save"></i> Enregistrer
                </button>

            </div>

        </form>

    </div>

</div>

<!-- code pour le modal de creation d'un nouveau patient -->

<div class="modal fade" id="addPatientModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">
            <i class="bi bi-person-plus"></i> Nouveau patient
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <div class="row g-3">

            <!-- NOM -->
            <div class="col-md-6">
                <label class="form-label">Nom</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="nom" class="form-control" placeholder="Nom">
                </div>
            </div>

            <!-- PRENOM -->
            <div class="col-md-6">
                <label class="form-label">Prénom</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="prenom" class="form-control" placeholder="Prénom">
                </div>
            </div>

            <!-- TELEPHONE -->
            <div class="col-md-6">
                <label class="form-label">Téléphone</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="text" id="telephone" class="form-control" placeholder="Téléphone">
                </div>
            </div>

            <!-- EMAIL -->
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Email">
                </div>
            </div>

            <!-- ADRESSE -->
            <div class="col-12">
                <label class="form-label">Adresse</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" id="adresse" class="form-control" placeholder="Adresse">
                </div>
            </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-success" id="savePatient">
            <i class="bi bi-check-circle"></i> Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>

<script>
$(document).ready(function() {
    $('.select2').select2({
        placeholder: "🔍 Rechercher un patient...",
        allowClear: true,
        ajax: {
            url: "/search-patient/",
            dataType: 'json',
            delay: 250,
            data: function(params) {
                return {
                    q: params.term // texte tapé
                };
            },
            processResults: function(data) {
                return {
                    results: data.results
                };
            }
        }
    });
});


// creation d'un nouveau patient via AJAX
document.getElementById("savePatient").addEventListener("click", async function() {

    let nom = document.getElementById("nom").value;
    let prenom = document.getElementById("prenom").value;
    let telephone = document.getElementById("telephone").value;
    let email = document.getElementById("email").value;
    let adresse = document.getElementById("adresse").value;

    let res = await fetch("/create-patient/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            nom: nom,
            prenom: prenom,
            telephone: telephone,
            email: email,
    adresse: adresse
        })
    });

    let data = await res.json();

    // 🔥 Ajouter dans Select2 automatiquement
    let newOption = new Option(data.text, data.id, true, true);
    $('.select2').append(newOption).trigger('change');

    // fermer modal
    let modal = bootstrap.Modal.getInstance(document.getElementById('addPatientModal'));
    modal.hide();

});

</script>

{% endblock %}
