{% extends "dashboard.html" %}
{% block title %}Nouvelle consultation{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

    .consultation-card{
        background: #ffffff;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border: none;
    }

    .consultation-title{
        font-weight: 700;
        color: #0d6efd;
    }

    .form-label{
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select{
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #dfe6e9;
        transition: all .3s ease;
    }

    .form-control:focus,
    .form-select:focus{
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15);
    }

    textarea.form-control{
        min-height: 120px;
        resize: vertical;
    }

    .input-icon{
        color: #0d6efd;
        font-size: 18px;
        margin-right: 8px;
    }

    .btn-submit{
        background: #0d6efd;
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: 600;
        transition: .3s;
    }

    .btn-submit:hover{
        background: #0b5ed7;
        transform: translateY(-1px);
    }

    .btn-cancel{
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: 600;
    }

</style>

<div class="container py-5">

    <div class="col-lg-7 mx-auto">

        <div class="consultation-card">

            <h3 class="consultation-title mb-4">
                <i class="bi bi-clipboard2-pulse me-2"></i>
                Nouvelle consultation
            </h3>

            <form method="post">

                {% csrf_token %}

                <!-- Patient -->
                <div class="mb-4">

                    <label class="form-label">
                        <i class="bi bi-person input-icon"></i>
                        Patient
                    </label>

                    {{ form.patient }}

                </div>

                <!-- Diagnostic -->
                <div class="mb-4">

                    <label class="form-label">
                        <i class="bi bi-clipboard-pulse input-icon"></i>
                        Diagnostic
                    </label>

                    {{ form.diagnostic }}

                </div>

                <!-- Traitement -->
                <div class="mb-4">

                    <label class="form-label">
                        <i class="bi bi-capsule input-icon"></i>
                        Traitement
                    </label>

                    {{ form.traitement }}

                </div>

                <!-- Boutons -->
                <div class="d-flex justify-content-end gap-3 mt-4">

                    <a href="{% url 'consultations:list' %}" 
                       class="btn btn-outline-secondary btn-cancel">

                        <i class="bi bi-arrow-left"></i>
                        Annuler

                    </a>

                    <button type="submit" 
                            class="btn btn-submit text-white">

                        <i class="bi bi-save"></i>
                        Enregistrer

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
