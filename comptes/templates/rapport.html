{% extends "dashboard.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.stat-card {
    border-radius: 15px;
    padding: 20px;
    color: white;
    position: relative;
    width: 100%;
    height: 120px;
}

.bg-blue { background: linear-gradient(135deg, #3b82f6, #1e3a8a); }
.bg-green { background: linear-gradient(135deg, #22c55e, #166534); }
.bg-orange { background: linear-gradient(135deg, #f59e0b, #92400e); }
.bg-purple { background: linear-gradient(135deg, #a855f7, #581c87); }

.stat-icon {
    position: absolute;
    right: 15px;
    top: 15px;
    opacity: 0.3;
}

.stat-value {
    font-size: 28px;
    font-weight: bold;
}

.chart-card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    margin-top: 30px;
}

canvas {
    width: 100% !important;
    height: 250px !important;
}
</style>

<div class="container py-4">

<div class="row g-4">

<div class="col-md-3">
<div class="stat-card bg-blue">
<i class="fa-solid fa-user-doctor stat-icon"></i>
<div>Consultations (mois)</div>
<div class="stat-value" id="c_mois">{{ nb_c_par_ce_mois }}</div>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-green">
<i class="fa-solid fa-calendar-check stat-icon"></i>
<div>Rendez-vous (mois)</div>
<div class="stat-value" id="r_mois">{{ nb_r_par_ce_mois }}</div>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-orange">
<i class="fa-solid fa-clock stat-icon"></i>
<div>RDV aujourd’hui</div>
<div class="stat-value" id="r_jour">{{ nb_r_ce_jour }}</div>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-purple">
<i class="fa-solid fa-stethoscope stat-icon"></i>
<div>Consultations aujourd’hui</div>
<div class="stat-value" id="c_jour">{{ nb_c_ce_jour }}</div>
</div>
</div>

</div>

<h4 class="text-center mt-5">📊 Dashboard</h4>

<div class="row">
<div class="col-md-6">
<div class="chart-card">
<canvas id="lineChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="chart-card">
<canvas id="doughnutChart"></canvas>
</div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Consultations mensuelles', data: [], backgroundColor: [
                '#3b82f6',
                '#22c55e',
                '#f59e0b',
                '#a855f7',
                '#ef4444',
                '#14b8a6',
                '#eab308'
            ],
            borderWidth: 2 }] }
});

let doughnutChart = new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [] , backgroundColor: [
                '#3b82f6',
                '#22c55e',
                '#f59e0b',
                '#a855f7',
                '#ef4444',
                '#14b8a6',
                '#eab308'
            ],
            borderWidth: 2}] }
});

async function loadDashboard() {
    try {
        const res = await fetch("/rapport/data/");
        const data = await res.json();

        console.log(data);

        document.getElementById("c_mois").innerText = data.nb_c_mois;
        document.getElementById("r_mois").innerText = data.nb_r_mois;
        document.getElementById("c_jour").innerText = data.nb_c_jour;
        document.getElementById("r_jour").innerText = data.nb_r_jour;

        lineChart.data.labels = data.chart1_labels;
        lineChart.data.datasets[0].data = data.chart1_data;
        lineChart.update();

        doughnutChart.data.labels = data.chart2_labels;
        doughnutChart.data.datasets[0].data = data.chart2_data;
        doughnutChart.update();

    } catch (e) {
        console.error("Erreur:", e);
    }
}

setInterval(loadDashboard, 5000);
loadDashboard();
</script>

{% endblock %}
