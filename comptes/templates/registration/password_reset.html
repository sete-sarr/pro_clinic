{% extends "base_auth.html" %}
{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<h4 class="text-center mb-4">Mot de passe oublié</h4>

<p class="text-muted mb-4 text-center">
    Entrez votre adresse email. Un lien de réinitialisation vous sera envoyé.
</p>

<form method="post" action="{{ comptes:password_reset_done}}" novalidate >
    {% csrf_token %}

    <div class="mb-4">
        <label class="form-label">Adresse email</label>
        {{ form.email }}
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Envoyer le lien
    </button>
</form>
{% endblock %}
